name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Sync docs dependencies
        run: uv sync --extra docs
      - name: Build & deploy to GitHub Pages
        run: uv run mkdocs gh-deploy --force
