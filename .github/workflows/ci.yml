name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (py${{ matrix.python }})
    # Apple-silicon runners — MLX requires arm64 macOS.
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python }}
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --extra dev --extra hub
      - name: Lint (ruff)
        run: uv run ruff check src tests examples
      - name: Format check (ruff)
        run: uv run ruff format --check src tests examples
      - name: Type check (mypy)
        run: uv run mypy
      - name: Tests (pytest)
        run: uv run pytest -q

  build:
    name: build distribution
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: uv build
      - name: Check metadata
        run: uvx twine check dist/*
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
